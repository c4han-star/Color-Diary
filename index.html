<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Diary — Cover Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/node-vibrant@3.1.6/dist/vibrant.min.js"></script>
  <script type="module">
    try {
      const { Muxer, ArrayBufferTarget } = await import('https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.js');
      window.Mp4Muxer = { Muxer, ArrayBufferTarget };
    } catch(e) { console.warn('mp4-muxer unavailable, will fall back to webm', e); }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Courier Prime', 'Courier New', monospace; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    input[type='range'] { -webkit-appearance: none; appearance: none; height: 2px; background: #d6d3d1; border-radius: 0; outline: none; cursor: pointer; width: 100%; }
    input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #292524; cursor: pointer; }
    input[type='range']::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #292524; border: none; cursor: pointer; }
    input[type='color'] { -webkit-appearance: none; border: none; padding: 0; cursor: pointer; }
    input[type='color']::-webkit-color-swatch-wrapper { padding: 0; }
    input[type='color']::-webkit-color-swatch { border: 1px solid #d6d3d1; border-radius: 0; }
    .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const CANVAS_W = 1000, CANVAS_H = 1400;
    const AUTO_DATE_EN = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
    const AUTO_DATE_CN = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

    const T = {
      en: {
        about: 'ABOUT', close: 'CLOSE',
        photo: 'Photo', upload: 'UPLOAD PHOTO / VIDEO', replace: 'REPLACE',
        title: 'Title', titlePh: 'ENTER TITLE...',
        date: 'Date', datePh: 'leave empty to hide', reset: 'RESET',
        split: 'Split ratio', fontSize: 'Font size', bgColor: 'Background color',
        fromPhoto: 'from photo', autoExtracted: 'auto-extracted', random: '↻ RANDOM',
        exportBtn: 'EXPORT AS PNG', exportNote: 'exports at full resolution',
        exportVideoBtn: 'EXPORT AS VIDEO', exportVideoNote: 'records up to 5 sec · exports as .mp4',
        recording: 'RECORDING…',
        saveHint: 'LONG PRESS IMAGE TO SAVE',
        uploadPrompt: 'UPLOAD A PHOTO OR VIDEO',
        captionEmpty: `${CANVAS_W} × ${CANVAS_H} · CLICK OR DRAG TO UPLOAD`,
        captionImage: 'DRAG TO REPOSITION · CLICK TO REPLACE',
        dragHint: 'DRAG TO REPOSITION', dragHintTouch: 'TWO FINGERS TO REPOSITION',
        captionImageTouch: 'TWO-FINGER DRAG · TAP TO REPLACE',
        dropImage: 'DROP FILE',
        aboutText: [
          "I'm a product designer who loves editing photos (and yes, I probably spend way too much time on Xiaohongshu and Instagram).",
          "Lately, the whole color walk thing has been everywhere.\nThose split covers — half color, half photo — look like something you can just throw together.",
          "I believed that.\nI was wrong.",
          "Picking colors, adjusting the layout, aligning everything, then doing it all over again…\nBy the time one cover is done, so am I.",
          "So I made a shortcut.",
          "Upload a photo, and it takes care of the colors, the gradient, the layout — all the annoying parts.\nYou just pick your shot, drag a bit, type something, and export.",
          "That's it.",
          "Save the effort… and go back to scrolling Instagram."
        ]
      },
      cn: {
        about: '关于', close: '关闭',
        photo: '照片 / 视频', upload: '上传照片 / 视频', replace: '重新上传',
        title: '标题', titlePh: '输入标题…',
        date: '日期', datePh: '留空则不显示', reset: '重置',
        split: '分割比例', fontSize: '字体大小', bgColor: '背景颜色',
        fromPhoto: '来自照片', autoExtracted: '自动提取', random: '↻ 随机',
        exportBtn: '导出 PNG', exportNote: '按原图分辨率导出',
        exportVideoBtn: '导出视频', exportVideoNote: '最长录制 5 秒 · 导出为 .mp4',
        recording: '录制中…',
        saveHint: '长按图片保存到相册',
        uploadPrompt: '上传照片或视频',
        captionEmpty: `${CANVAS_W} × ${CANVAS_H} · 点击或拖拽上传`,
        captionImage: '拖拽调整位置 · 点击重新上传',
        dragHint: '拖拽调整位置', dragHintTouch: '双指拖动调整位置',
        captionImageTouch: '双指拖动 · 点击换图',
        dropImage: '松开上传',
        aboutText: [
          "我是个很爱修图的产品设计师（也确实在小红书和 IG 上待太久了）。",
          "最近 color walk 真的太火了。\n那种一半颜色一半照片的封面，看着像「随便做做就有了」。",
          "我信了。\n然后被打脸了。",
          "调色、找构图、对齐、再改一遍……\n一张图做完，人也差不多废了。",
          "所以我做了个偷懒工具。",
          "上传照片，它会帮你把配色、渐变、排版这些麻烦事都处理掉。\n你只需要选图、拖一拖、打点字、导出。",
          "剩下的时间，拿去继续刷小红书就好。"
        ]
      }
    };

    function hexToRgb(hex) {
      return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }

    function shiftColor(hex, n) {
      const { r, g, b } = hexToRgb(hex);
      const c = v => Math.min(255, Math.max(0, v + n));
      return `rgb(${c(r)},${c(g)},${c(b)})`;
    }

    function getTextColor(hex) {
      try {
        const { r, g, b } = hexToRgb(hex);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.52 ? '#1c1917' : '#faf9f7';
      } catch { return '#1c1917'; }
    }

    function measureLines(ctx, text, maxW) {
      if (!text.trim()) return [];
      const words = text.split(' '); let line = '', lines = [];
      for (const w of words) {
        const c = line ? line + ' ' + w : w;
        if (ctx.measureText(c).width > maxW && line) { lines.push(line); line = w; } else line = c;
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawLines(ctx, lines, x, cy, lh) {
      const sy = cy - lines.length * lh / 2 + lh / 2;
      lines.forEach((l, i) => ctx.fillText(l, x, sy + i * lh));
      return sy + lines.length * lh - lh / 2;
    }

    function addGrain(ctx, x, y, w, h, intensity) {
      const d = ctx.getImageData(x, y, w, h), px = d.data;
      for (let i = 0; i < px.length; i += 4) {
        const n = (Math.random() - 0.5) * intensity;
        px[i]   = Math.min(255, Math.max(0, px[i]   + n));
        px[i+1] = Math.min(255, Math.max(0, px[i+1] + n));
        px[i+2] = Math.min(255, Math.max(0, px[i+2] + n));
      }
      ctx.putImageData(d, x, y);
    }

    function drawGradBlock(ctx, color, x, y, w, h, grain) {
      const g = ctx.createLinearGradient(x, y, x, y + h);
      g.addColorStop(0,    shiftColor(color,  24));
      g.addColorStop(0.52, color);
      g.addColorStop(1,    shiftColor(color, -22));
      ctx.fillStyle = g;
      ctx.fillRect(x, y, w, h);
      addGrain(ctx, x, y, w, h, grain);
    }

    function ColorPicker({ color, onChange, onRandom, palette, label, randomLabel }) {
      return (
        <div className="flex items-start gap-3">
          <div className="flex items-center gap-3 flex-1">
            <div className="relative w-10 h-7 border border-stone-300 overflow-hidden flex-shrink-0">
              <input type="color" value={color} onChange={e => onChange(e.target.value)}
                className="absolute -inset-1 opacity-0 cursor-pointer"
                style={{ width: 'calc(100% + 8px)', height: 'calc(100% + 8px)' }} />
              <div className="absolute inset-0 pointer-events-none" style={{ background: color }} />
            </div>
            <span className="text-xs text-stone-600 font-mono tracking-widest">{color.toUpperCase()}</span>
            {label && <span className="text-xs text-stone-400">{label}</span>}
          </div>
          {onRandom && (
            <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
              <button onClick={onRandom}
                className="text-xs text-stone-400 hover:text-stone-800 transition-colors tracking-widest">
                {randomLabel || '↻ RANDOM'}
              </button>
              {palette && palette.length > 0 && (
                <div className="flex gap-1">
                  {palette.map((c, i) => (
                    <button key={i} onClick={() => onChange(c)} title={c}
                      className={`w-5 h-5 flex-shrink-0 border transition-all ${color === c ? 'border-stone-500' : 'border-transparent hover:border-stone-300'}`}
                      style={{ background: c }} />
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function Section({ label, value, children }) {
      return (
        <div>
          <div className="flex items-baseline justify-between mb-1.5">
            <span className="text-xs text-stone-400 uppercase" style={{ letterSpacing: '0.14em' }}>{label}</span>
            {value && <span className="text-xs text-stone-400">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function App() {
      const [lang, setLang]           = useState('en');
      const [showAbout, setShowAbout] = useState(false);
      const t = T[lang];
      const AUTO_DATE = lang === 'en' ? AUTO_DATE_EN : AUTO_DATE_CN;

      const [image, setImage]         = useState(null);
      const [title, setTitle]         = useState('Turn moments into color.');
      const [split, setSplit]         = useState(0.5);
      const [fontSize, setFontSize]   = useState(26);
      const [bgColor, setBgColor]     = useState('#c9bba8');
      const [palette, setPalette]     = useState([]);
      const [pan, setPan]             = useState({ x: 0, y: 0 });
      const [dateText, setDateText]   = useState(AUTO_DATE_EN);
      const [sourceType, setSourceType] = useState(null);
      const [isExporting, setIsExporting] = useState(false);
      const [showPanHint, setShowPanHint] = useState(false);
      const hintTimer = useRef(null);
      const [dropHover, setDropHover] = useState(false);
      const [fontsReady, setFontsReady] = useState(false);

      const [activeTab, setActiveTab] = useState('photo');
      const [savedImgUrl, setSavedImgUrl] = useState(null);
      const [photoZoom, setPhotoZoom] = useState(1);

      const canvasRef = useRef(null), fileRef = useRef(null), wrapRef = useRef(null);
      const ps = useRef({ on: false, sx: 0, sy: 0, spx: 0, spy: 0, moved: false, inImg: false, dragActive: false });
      const animRef = useRef(null);
      const longPressTimer = useRef(null);
      const touches = useRef({});
      const lastPinch = useRef(null);
      const videoElRef = useRef(null); // keeps video element in DOM for iOS canvas drawImage

      const [viewW, setViewW] = useState(window.innerWidth);
      const [viewH, setViewH] = useState(window.innerHeight);
      useEffect(() => {
        const handler = () => { setViewW(window.innerWidth); setViewH(window.innerHeight); };
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);
      const isMobile = viewW < 640;
      // Fixed dark workspace height: 57% of usable viewport (below ~54px header)
      const darkAreaH = isMobile ? Math.max(220, Math.round((viewH - 54) * 0.57)) : 0;
      // Card occupies 83% of dark area height — slightly larger default, visible dark border
      const PW = isMobile
        ? Math.round(darkAreaH * 0.83 * CANVAS_W / CANVAS_H)
        : 400;
      const PH = Math.round(PW / CANVAS_W * CANVAS_H);

      useEffect(() => { document.fonts.ready.then(() => setFontsReady(true)); }, []);

      const draw = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const topH = Math.round(CANVAS_H * split), botH = CANVAS_H - topH;
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

        drawGradBlock(ctx, bgColor, 0, 0, CANVAS_W, topH, 38);

        if (image) {
          // videoWidth/videoHeight for <video>, naturalWidth for <img>
          const iw = image.videoWidth  || image.naturalWidth  || image.width;
          const ih = image.videoHeight || image.naturalHeight || image.height;
          const ia = iw / ih, ta = CANVAS_W / botH;
          let sw, sh;
          if (ia > ta) { sh = ih / photoZoom; sw = sh * ta; }
          else          { sw = iw / photoZoom; sh = sw / ta; }
          const sx = Math.max(0, Math.min(iw - sw, (iw - sw) / 2 + pan.x));
          const sy = Math.max(0, Math.min(ih - sh, (ih - sh) / 2 + pan.y));
          ctx.drawImage(image, sx, sy, sw, sh, 0, topH, CANVAS_W, botH);
        } else {
          ctx.fillStyle = '#b8afa6';
          ctx.fillRect(0, topH, CANVAS_W, botH);
          ctx.fillStyle = 'rgba(28,25,23,0.4)';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = '24px "Courier Prime","Courier New",monospace';
          ctx.fillText(t.uploadPrompt, CANVAS_W / 2, topH + botH / 2);
        }

        const tc = getTextColor(bgColor);
        ctx.fillStyle = tc; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `400 ${fontSize}px "Courier Prime","Courier New",monospace`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '6px';
        const lines = measureLines(ctx, title || ' ', CANVAS_W * 0.7);
        const btm = drawLines(ctx, lines, CANVAS_W / 2, topH * 0.46, fontSize * 1.5);

        if (dateText) {
          const ry = btm + 32;
          ctx.strokeStyle = tc; ctx.globalAlpha = 0.3; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(CANVAS_W/2 - 40, ry); ctx.lineTo(CANVAS_W/2 + 40, ry); ctx.stroke();
          ctx.globalAlpha = 1;

          ctx.font = `400 ${Math.max(14, Math.round(fontSize * 0.7))}px "Courier Prime","Courier New",monospace`;
          if ('letterSpacing' in ctx) ctx.letterSpacing = '4px';
          ctx.fillStyle = tc;
          ctx.globalAlpha = 0.55;
          ctx.fillText(dateText, CANVAS_W / 2, ry + 28);
          ctx.globalAlpha = 1;
          if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
        }
      }, [image, bgColor, title, split, fontSize, pan, dateText, lang, photoZoom]);

      useEffect(() => { draw(); }, [draw, fontsReady]);

      const load = useCallback(async (file) => {
        if (!file) return;
        // Remove any previous video element from DOM
        if (videoElRef.current) {
          videoElRef.current.pause();
          videoElRef.current.remove();
          videoElRef.current = null;
        }
        const url = URL.createObjectURL(file);

        const afterLoad = async (el, type) => {
          setImage(el); setSourceType(type); setPan({ x: 0, y: 0 }); setPhotoZoom(1);
          clearTimeout(hintTimer.current);
          setShowPanHint(true);
          hintTimer.current = setTimeout(() => setShowPanHint(false), 2500);
          try {
            let src = type === 'video' ? (() => {
              const tmp = document.createElement('canvas');
              tmp.width = 200; tmp.height = 200;
              tmp.getContext('2d').drawImage(el, 0, 0, 200, 200);
              return tmp;
            })() : url;
            const p = await Vibrant.from(src).getPalette();
            const keys = ['Vibrant','LightVibrant','DarkVibrant','Muted','LightMuted','DarkMuted'];
            const colors = keys.map(k => p[k]?.hex).filter(Boolean);
            setPalette(colors);
            const v = p.Vibrant ?? p.LightVibrant ?? p.Muted;
            if (v) setBgColor(v.hex);
          } catch (e) {}
        };

        if (file.type.startsWith('image/')) {
          const img = new Image();
          img.onload = () => afterLoad(img, 'image');
          img.src = url;
        } else if (file.type.startsWith('video/')) {
          const vid = document.createElement('video');
          vid.muted = true; vid.loop = true; vid.playsInline = true; vid.preload = 'auto';
          // iOS Safari requires the video element to be in the DOM for ctx.drawImage to decode frames
          vid.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none';
          document.body.appendChild(vid);
          videoElRef.current = vid;
          let done = false;
          const onReady = () => {
            if (!done) {
              done = true;
              vid.play().catch(() => {});
              afterLoad(vid, 'video');
            }
          };
          vid.addEventListener('loadedmetadata', onReady, { once: true });
          vid.addEventListener('loadeddata',     onReady, { once: true });
          vid.addEventListener('canplay',        onReady, { once: true });
          vid.src = url;
          vid.load();
        }
      }, []);

      const randomFromPalette = useCallback(() => {
        if (palette.length === 0) return;
        setBgColor(palette[Math.floor(Math.random() * palette.length)]);
      }, [palette]);

      useEffect(() => {
        cancelAnimationFrame(animRef.current);
        if (sourceType !== 'video' || !image) return;
        image.play().catch(() => {});
        const tick = () => { draw(); animRef.current = requestAnimationFrame(tick); };
        animRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(animRef.current);
      }, [sourceType, image, draw]);

      const exportVideo = useCallback(async () => {
        if (!image || sourceType !== 'video' || isExporting) return;
        setIsExporting(true);
        const durationSec = Math.min(image.duration || 5, 5);
        const stem = (title || 'cover').trim().replace(/\s+/g, '-').toLowerCase();
        image.currentTime = 0;
        image.play().catch(() => {});

        // Path 1: WebCodecs + mp4-muxer → real MP4 (Chrome/Edge)
        if (window.Mp4Muxer && typeof VideoEncoder !== 'undefined') {
          try {
            const { Muxer, ArrayBufferTarget } = window.Mp4Muxer;
            const target = new ArrayBufferTarget();
            const muxer = new Muxer({
              target,
              video: { codec: 'avc', width: CANVAS_W, height: CANVAS_H },
              fastStart: 'in-memory',
            });
            const encoder = new VideoEncoder({
              output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
              error: console.error,
            });
            encoder.configure({
              codec: 'avc1.42001f', width: CANVAS_W, height: CANVAS_H,
              bitrate: 8_000_000, framerate: 30,
            });
            const fps = 30, total = Math.round(durationSec * fps);
            await new Promise(resolve => {
              let i = 0;
              const id = setInterval(() => {
                if (i >= total) { clearInterval(id); resolve(); return; }
                const frame = new VideoFrame(canvasRef.current, {
                  timestamp: Math.round(i / fps * 1_000_000),
                });
                encoder.encode(frame, { keyFrame: i % fps === 0 });
                frame.close();
                i++;
              }, 1000 / fps);
            });
            await encoder.flush();
            muxer.finalize();
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = stem + '.mp4';
            a.click();
            setIsExporting(false);
            return;
          } catch(e) { console.warn('WebCodecs failed, falling back', e); }
        }

        // Path 2: MediaRecorder → MP4 on Safari, WebM elsewhere
        const stream = canvasRef.current.captureStream(30);
        const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: mimeType });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = stem + (mimeType.includes('mp4') ? '.mp4' : '.webm');
          a.click();
          setIsExporting(false);
        };
        recorder.start();
        setTimeout(() => recorder.stop(), durationSec * 1000);
      }, [image, sourceType, isExporting, title]);

      // Clamp pan so photo never exposes empty space (both axes, zoom-aware)
      const clampPan = useCallback((nx, ny, zoom) => {
        if (!image) return { x: nx, y: ny };
        const iw = image.videoWidth  || image.naturalWidth  || image.width;
        const ih = image.videoHeight || image.naturalHeight || image.height;
        const botH = CANVAS_H - Math.round(CANVAS_H * split);
        const ta = CANVAS_W / botH, ia = iw / ih;
        let sw, sh;
        if (ia > ta) { sh = ih / zoom; sw = sh * ta; }
        else          { sw = iw / zoom; sh = sw / ta; }
        const maxX = (iw - sw) / 2;
        const maxY = (ih - sh) / 2;
        return {
          x: Math.max(-maxX, Math.min(maxX, nx)),
          y: Math.max(-maxY, Math.min(maxY, ny)),
        };
      }, [image, split]);

      const onPointerDown = (e) => {
        if (e.button !== 0 && e.pointerType === 'mouse') return;
        touches.current[e.pointerId] = { x: e.clientX, y: e.clientY };
        const n = Object.keys(touches.current).length;

        if (n === 1) {
          ps.current = { sx: e.clientX, sy: e.clientY, spx: pan.x, spy: pan.y, moved: false, dragActive: false };
          if (e.pointerType === 'mouse' && image) {
            const rect = wrapRef.current.getBoundingClientRect();
            if ((e.clientY - rect.top) / rect.height >= split) {
              ps.current.dragActive = true;
              e.preventDefault();
            }
          }
        } else if (n === 2) {
          ps.current = { moved: true };
          const pts = Object.values(touches.current);
          lastPinch.current = {
            dist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
            startZoom: photoZoom,
            prevMidX: (pts[0].x + pts[1].x) / 2,
            prevMidY: (pts[0].y + pts[1].y) / 2,
          };
        }
      };

      const onPointerMove = (e) => {
        if (!(e.pointerId in touches.current)) return;
        touches.current[e.pointerId] = { x: e.clientX, y: e.clientY };
        const n = Object.keys(touches.current).length;

        if (n === 2 && lastPinch.current && image) {
          const pts = Object.values(touches.current);
          const newDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
          const newMidX = (pts[0].x + pts[1].x) / 2;
          const newMidY = (pts[0].y + pts[1].y) / 2;

          // Pinch → zoom photo inside container (min 1 = cover, max 5x)
          const newZoom = Math.max(1, Math.min(5,
            lastPinch.current.startZoom * newDist / lastPinch.current.dist));
          setPhotoZoom(newZoom);

          // Drag midpoint → pan photo, scale delta by current crop size
          const dmx = newMidX - lastPinch.current.prevMidX;
          const dmy = newMidY - lastPinch.current.prevMidY;
          if (image && (Math.abs(dmx) > 0.3 || Math.abs(dmy) > 0.3)) {
            const iw = image.videoWidth  || image.naturalWidth  || image.width;
            const ih = image.videoHeight || image.naturalHeight || image.height;
            const botH = CANVAS_H - Math.round(CANVAS_H * split);
            const botH_p = PH - Math.round(PH * split);
            const ta = CANVAS_W / botH, ia = iw / ih;
            let sw, sh;
            if (ia > ta) { sh = ih / newZoom; sw = sh * ta; }
            else          { sw = iw / newZoom; sh = sw / ta; }
            setPan(prev => clampPan(
              prev.x - dmx * (sw / PW),
              prev.y - dmy * (sh / botH_p),
              newZoom,
            ));
          }
          lastPinch.current.prevMidX = newMidX;
          lastPinch.current.prevMidY = newMidY;
          return;
        }

        if (!ps.current) return;
        const dx = e.clientX - ps.current.sx, dy = e.clientY - ps.current.sy;
        if (Math.hypot(dx, dy) > 8) ps.current.moved = true;

        if (e.pointerType === 'mouse' && ps.current.dragActive && image) {
          const iw = image.videoWidth  || image.naturalWidth  || image.width;
          const ih = image.videoHeight || image.naturalHeight || image.height;
          const botH = CANVAS_H - Math.round(CANVAS_H * split);
          const botH_p = PH - Math.round(PH * split);
          const ta = CANVAS_W / botH, ia = iw / ih;
          let sw, sh;
          if (ia > ta) { sh = ih / photoZoom; sw = sh * ta; }
          else          { sw = iw / photoZoom; sh = sw / ta; }
          setPan(clampPan(
            ps.current.spx - dx * (sw / PW),
            ps.current.spy - dy * (sh / botH_p),
            photoZoom,
          ));
        }
      };

      const onPointerUp = (e) => {
        delete touches.current[e.pointerId];
        const n = Object.keys(touches.current).length;
        if (n < 2) lastPinch.current = null;
        if (n === 0 && ps.current) {
          if (!ps.current.moved) fileRef.current?.click();
          ps.current = null;
        }
      };

      const onPointerCancel = (e) => {
        delete touches.current[e.pointerId];
        if (Object.keys(touches.current).length === 0) {
          ps.current = null; lastPinch.current = null;
        }
      };

      const exportPng = useCallback(() => {
        const filename = (title || 'cover').trim().replace(/\s+/g, '-').toLowerCase() + '.png';

        // Scale export canvas to match original image resolution (no downscaling)
        const topH_c = Math.round(CANVAS_H * split);
        const botH_c = CANVAS_H - topH_c;
        let scale = 1;
        if (image) {
          const iw = image.videoWidth || image.naturalWidth || image.width;
          const ih = image.videoHeight || image.naturalHeight || image.height;
          if (iw && ih) {
            const ta = CANVAS_W / botH_c, ia = iw / ih;
            const sw = ia > ta ? (ih / photoZoom) * ta : iw / photoZoom;
            scale = Math.min(4, Math.max(1, sw / CANVAS_W));
          }
        }

        const EW = Math.round(CANVAS_W * scale);
        const EH = Math.round(CANVAS_H * scale);
        const topH = Math.round(EH * split);
        const botH = EH - topH;

        const ec = document.createElement('canvas');
        ec.width = EW; ec.height = EH;
        const ctx = ec.getContext('2d');

        drawGradBlock(ctx, bgColor, 0, 0, EW, topH, 38);

        if (image) {
          const iw = image.videoWidth || image.naturalWidth || image.width;
          const ih = image.videoHeight || image.naturalHeight || image.height;
          const ta = CANVAS_W / botH_c, ia = iw / ih;
          let sw, sh;
          if (ia > ta) { sh = ih / photoZoom; sw = sh * ta; }
          else          { sw = iw / photoZoom; sh = sw / ta; }
          const sx = Math.max(0, Math.min(iw - sw, (iw - sw) / 2 + pan.x));
          const sy = Math.max(0, Math.min(ih - sh, (ih - sh) / 2 + pan.y));
          ctx.drawImage(image, sx, sy, sw, sh, 0, topH, EW, botH);
        } else {
          ctx.fillStyle = '#b8afa6';
          ctx.fillRect(0, topH, EW, botH);
        }

        const tc = getTextColor(bgColor);
        const fs = Math.round(fontSize * scale);
        ctx.fillStyle = tc; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `400 ${fs}px "Courier Prime","Courier New",monospace`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = `${Math.round(6 * scale)}px`;
        const lines = measureLines(ctx, title || ' ', EW * 0.7);
        const btm = drawLines(ctx, lines, EW / 2, topH * 0.46, Math.round(fs * 1.5));

        if (dateText) {
          const ry = btm + Math.round(32 * scale);
          ctx.strokeStyle = tc; ctx.globalAlpha = 0.3; ctx.lineWidth = Math.max(0.5, scale * 0.5);
          ctx.beginPath();
          ctx.moveTo(EW/2 - Math.round(40*scale), ry);
          ctx.lineTo(EW/2 + Math.round(40*scale), ry);
          ctx.stroke();
          ctx.globalAlpha = 1;
          const dfs = Math.round(Math.max(14, Math.round(fontSize * 0.7)) * scale);
          ctx.font = `400 ${dfs}px "Courier Prime","Courier New",monospace`;
          if ('letterSpacing' in ctx) ctx.letterSpacing = `${Math.round(4 * scale)}px`;
          ctx.fillStyle = tc; ctx.globalAlpha = 0.55;
          ctx.fillText(dateText, EW / 2, ry + Math.round(28 * scale));
          ctx.globalAlpha = 1;
          if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
        }

        ec.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          if (isMobile) {
            setSavedImgUrl(url);
          } else {
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
        }, 'image/png');
      }, [title, isMobile, image, split, bgColor, fontSize, photoZoom, pan, dateText]);

      return (
        <div className="bg-stone-50" style={{ fontFamily: "'Courier Prime','Courier New',monospace", ...(isMobile ? { height: viewH, overflow: 'hidden' } : { minHeight: '100vh' }) }}>

          {savedImgUrl && (
            <div className="fixed inset-0 z-50 bg-stone-900 flex flex-col">
              <div className="flex items-center justify-between px-5 py-4">
                <p className="text-white/60 text-xs tracking-widest">{t.saveHint}</p>
                <button onClick={() => { URL.revokeObjectURL(savedImgUrl); setSavedImgUrl(null); }}
                  className="text-white text-xs tracking-widest">{t.close}</button>
              </div>
              <div className="flex-1 flex items-center justify-center px-4 pb-8">
                <img src={savedImgUrl} alt="cover"
                  style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
              </div>
            </div>
          )}

          {showAbout && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-stone-900/40"
              onClick={() => setShowAbout(false)}>
              <div className="bg-stone-50 max-w-lg w-full mx-6 p-10 shadow-xl relative"
                onClick={e => e.stopPropagation()}>
                <button onClick={() => setShowAbout(false)}
                  className="absolute top-5 right-6 text-stone-400 hover:text-stone-700 text-xs tracking-widest transition-colors">
                  {t.close}
                </button>
                <div className="flex flex-col gap-5 text-stone-600 text-sm leading-relaxed">
                  <img src="persona.svg" alt="" style={{height:'110px',width:'auto'}} />
                  {t.aboutText.map((p, i) => <p key={i} style={{whiteSpace:'pre-line'}}>{p}</p>)}
                </div>
              </div>
            </div>
          )}

          <header className="border-b border-stone-200 px-4 sm:px-12 py-2">
            <div className="max-w-6xl mx-auto flex items-center gap-3">
              <img src="logo%20(1).png" alt="Color Diary" style={{height:'40px',width:'auto'}} />
              <span className="text-sm text-stone-600">Color Diary</span>
              <div className="ml-auto flex items-center gap-4">
                <div className="flex items-center gap-1 text-xs tracking-widest">
                  <button onClick={() => setLang('en')}
                    className={`transition-colors ${lang==='en' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}>
                    EN
                  </button>
                  <span className="text-stone-300">/</span>
                  <button onClick={() => setLang('cn')}
                    className={`transition-colors ${lang==='cn' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}>
                    CN
                  </button>
                </div>
                <button onClick={() => setShowAbout(true)}
                  className="text-xs text-stone-400 hover:text-stone-700 tracking-widest transition-colors">
                  {t.about}
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto sm:px-12 sm:pt-14 pb-8 flex flex-col sm:flex-row sm:gap-12 items-start">

            {/* always-present hidden file input so canvas tap always works */}
            <input ref={fileRef} type="file" accept="image/*,video/*" className="hidden"
              onChange={e => load(e.target.files[0])} />

            <div className="w-full sm:w-auto sm:flex-shrink-0 flex flex-col sm:items-center sm:gap-3">

              {/* Mobile: dark canvas zone — fixed height workspace, card floats centered */}
              {isMobile ? (
                <div className="w-full bg-stone-900 flex items-center justify-center overflow-hidden"
                  style={{ height: darkAreaH }}>
                  <div ref={wrapRef}
                    className={`relative overflow-hidden select-none ${dropHover ? 'ring-1 ring-white/30' : ''}`}
                    style={{ width: PW, height: PH, touchAction: 'none', boxShadow: '0 8px 32px rgba(0,0,0,0.55)' }}
                    onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}
                    onPointerLeave={onPointerCancel} onPointerCancel={onPointerCancel}
                    onDrop={e => { e.preventDefault(); setDropHover(false); load(e.dataTransfer.files[0]); }}
                    onDragOver={e => { e.preventDefault(); setDropHover(true); }}
                    onDragLeave={() => setDropHover(false)}>
                    <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H}
                      style={{ width: '100%', height: '100%', display: 'block' }} />
                    {showPanHint && image && (
                      <div className="absolute inset-0 flex flex-col items-center justify-end pointer-events-none"
                        style={{ paddingBottom: `${Math.round(PH * 0.28)}px` }}>
                        <div className="bg-stone-900/60 text-white text-xs px-4 py-2 tracking-widest"
                          style={{ letterSpacing: '0.12em' }}>
                          {t.dragHintTouch}
                        </div>
                      </div>
                    )}
                    {dropHover && (
                      <div className="absolute inset-0 flex items-center justify-center bg-stone-900/20">
                        <span className="text-white text-xs tracking-widest">{t.dropImage}</span>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                /* Desktop: canvas on light bg */
                <div ref={wrapRef}
                  className={`relative overflow-hidden select-none ${image ? 'cursor-grab' : 'cursor-pointer'} shadow-sm ${dropHover ? 'ring-1 ring-stone-400' : ''}`}
                  style={{ width: PW, height: PH, background: '#e7e3de', touchAction: 'none' }}
                  onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}
                  onPointerLeave={onPointerCancel} onPointerCancel={onPointerCancel}
                  onDrop={e => { e.preventDefault(); setDropHover(false); load(e.dataTransfer.files[0]); }}
                  onDragOver={e => { e.preventDefault(); setDropHover(true); }}
                  onDragLeave={() => setDropHover(false)}>
                  <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H}
                    style={{ width: '100%', height: '100%', display: 'block' }} />
                  {showPanHint && (
                    <div className="absolute inset-0 flex flex-col items-center justify-end pointer-events-none"
                      style={{ paddingBottom: `${Math.round(PH * 0.28)}px` }}>
                      <div className="bg-stone-900/60 text-white text-xs px-4 py-2 tracking-widest"
                        style={{ letterSpacing: '0.12em' }}>
                        {t.dragHint}
                      </div>
                    </div>
                  )}
                  {dropHover && (
                    <div className="absolute inset-0 flex items-center justify-center bg-stone-900/20">
                      <span className="text-white text-xs tracking-widest">{t.dropImage}</span>
                    </div>
                  )}
                </div>
              )}

              {/* Mobile: export row between dark area and tab bar */}
              {isMobile && (
                <div className="px-5 py-3 flex items-center justify-between w-full border-b border-stone-100 bg-stone-50">
                  <span className="text-xs text-stone-400" style={{ letterSpacing: '0.07em' }}>
                    {sourceType === 'video' ? t.exportVideoNote : t.exportNote}
                  </span>
                  <button onClick={sourceType === 'video' ? exportVideo : exportPng} disabled={isExporting}
                    className="px-5 py-2 bg-stone-800 text-stone-50 text-xs tracking-widest disabled:opacity-50 flex-shrink-0">
                    {isExporting ? t.recording : sourceType === 'video' ? t.exportVideoBtn : t.exportBtn}
                  </button>
                </div>
              )}

              {/* Desktop caption */}
              {!isMobile && (
                <p className="text-xs text-stone-400" style={{ letterSpacing: '0.1em' }}>
                  {image ? t.captionImage : t.captionEmpty}
                </p>
              )}

              {/* Mobile: tab bar + active control panel */}
              {isMobile && (() => {
                const tabs = [
                  { id: 'photo',    icon: '⊕',  label: t.photo    },
                  { id: 'title',    icon: 'T',   label: t.title    },
                  { id: 'date',     icon: '≡',   label: t.date     },
                  { id: 'split',    icon: '/',   label: t.split    },
                  { id: 'fontSize', icon: 'Aa',  label: t.fontSize },
                  { id: 'color',    icon: '■',   label: t.bgColor  },
                ];
                return (
                  <>
                    <div className="flex w-full border-t border-stone-100 bg-stone-50">
                      {tabs.map(tab => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                          className={`flex-1 flex flex-col items-center py-3 gap-1 transition-colors ${activeTab === tab.id ? 'text-stone-800 border-b-2 border-stone-800' : 'text-stone-400'}`}>
                          <span className="text-sm leading-none"
                            style={tab.id === 'color' ? { color: bgColor } : {}}>
                            {tab.icon}
                          </span>
                          <span style={{ fontSize: '9px', letterSpacing: '0.04em' }}>{tab.label}</span>
                        </button>
                      ))}
                    </div>
                    <div className="px-4 py-4 w-full min-h-[88px] border-b border-stone-100">
                      {activeTab === 'photo' && (
                        <button onClick={() => fileRef.current?.click()}
                          className="w-full py-2.5 border border-stone-300 text-stone-600 text-xs tracking-widest">
                          {image ? t.replace : t.upload}
                        </button>
                      )}
                      {activeTab === 'title' && (
                        <input type="text" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                          className="w-full border-b border-stone-200 focus:border-stone-600 outline-none py-2 text-stone-800 text-sm bg-transparent tracking-widest"
                          style={{ fontFamily: "'Courier Prime','Courier New',monospace" }}
                          placeholder={t.titlePh} />
                      )}
                      {activeTab === 'date' && (
                        <div className="flex items-center gap-3">
                          <input type="text" value={dateText} onChange={e => setDateText(e.target.value)} autoFocus
                            className="flex-1 border-b border-stone-200 focus:border-stone-600 outline-none py-2 text-stone-600 text-xs bg-transparent tracking-widest"
                            style={{ fontFamily: "'Courier Prime','Courier New',monospace" }}
                            placeholder={t.datePh} />
                          <button onClick={() => setDateText(AUTO_DATE)}
                            className="text-xs text-stone-400 tracking-widest flex-shrink-0">{t.reset}</button>
                        </div>
                      )}
                      {activeTab === 'split' && (
                        <Section label={t.split} value={`${Math.round(split*100)} / ${Math.round((1-split)*100)}`}>
                          <input type="range" min="0.2" max="0.75" step="0.01" value={split}
                            onChange={e => setSplit(parseFloat(e.target.value))} className="mt-2" />
                        </Section>
                      )}
                      {activeTab === 'fontSize' && (
                        <Section label={t.fontSize} value={`${fontSize}px`}>
                          <input type="range" min="12" max="72" step="1" value={fontSize}
                            onChange={e => setFontSize(parseInt(e.target.value))} className="mt-2" />
                        </Section>
                      )}
                      {activeTab === 'color' && (
                        <ColorPicker color={bgColor} onChange={setBgColor}
                          onRandom={palette.length > 0 ? randomFromPalette : null}
                          palette={palette}
                          label={palette.length > 0 ? t.fromPhoto : t.autoExtracted}
                          randomLabel={t.random} />
                      )}
                    </div>
                  </>
                );
              })()}
            </div>

            {/* Desktop controls panel */}
            {!isMobile && (
              <div className="no-scrollbar flex-1 flex flex-col gap-5 overflow-y-auto" style={{height: PH}}>
                <Section label={t.photo}>
                  <button onClick={() => fileRef.current?.click()}
                    className="w-full py-2 border border-stone-300 text-stone-600 text-xs hover:border-stone-500 hover:text-stone-800 transition-colors tracking-widest">
                    {image ? t.replace : t.upload}
                  </button>
                </Section>
                <Section label={t.title}>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)}
                    className="w-full border-b border-stone-200 focus:border-stone-600 outline-none py-1 text-stone-800 text-sm bg-transparent transition-colors tracking-widest"
                    style={{ fontFamily: "'Courier Prime','Courier New',monospace" }}
                    placeholder={t.titlePh} />
                </Section>
                <Section label={t.date}>
                  <div className="flex items-center gap-3">
                    <input type="text" value={dateText} onChange={e => setDateText(e.target.value)}
                      className="flex-1 border-b border-stone-200 focus:border-stone-600 outline-none py-1 text-stone-600 text-xs bg-transparent transition-colors tracking-widest"
                      style={{ fontFamily: "'Courier Prime','Courier New',monospace" }}
                      placeholder={t.datePh} />
                    <button onClick={() => setDateText(AUTO_DATE)}
                      className="text-xs text-stone-400 hover:text-stone-700 transition-colors tracking-widest flex-shrink-0">
                      {t.reset}
                    </button>
                  </div>
                </Section>
                <Section label={t.split} value={`${Math.round(split * 100)} / ${Math.round((1 - split) * 100)}`}>
                  <input type="range" min="0.2" max="0.75" step="0.01" value={split}
                    onChange={e => setSplit(parseFloat(e.target.value))} className="mt-1.5" />
                </Section>
                <Section label={t.fontSize} value={`${fontSize}px`}>
                  <input type="range" min="12" max="72" step="1" value={fontSize}
                    onChange={e => setFontSize(parseInt(e.target.value))} className="mt-1.5" />
                </Section>
                <Section label={t.bgColor}>
                  <ColorPicker color={bgColor} onChange={setBgColor}
                    onRandom={palette.length > 0 ? randomFromPalette : null}
                    palette={palette}
                    label={palette.length > 0 ? t.fromPhoto : t.autoExtracted}
                    randomLabel={t.random} />
                </Section>
                <div className="pt-3 mt-auto border-t border-stone-200">
                  <button onClick={sourceType === 'video' ? exportVideo : exportPng} disabled={isExporting}
                    className="w-full py-3 bg-stone-800 text-stone-50 text-xs tracking-widest hover:bg-stone-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    {isExporting ? t.recording : sourceType === 'video' ? t.exportVideoBtn : t.exportBtn}
                  </button>
                  <p className="text-xs text-stone-400 text-center mt-1.5">
                    {sourceType === 'video' ? t.exportVideoNote : t.exportNote}
                  </p>
                </div>
              </div>
            )}
          </main>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
