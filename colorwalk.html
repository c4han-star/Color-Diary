<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorwalk — Cover Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/node-vibrant@3.1.6/dist/vibrant.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Cormorant Garamond', Georgia, serif; -webkit-font-smoothing: antialiased; }

    input[type='range'] {
      -webkit-appearance: none; appearance: none;
      height: 2px; background: #d6d3d1; border-radius: 0; outline: none; cursor: pointer; width: 100%;
    }
    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%; background: #292524; cursor: pointer;
    }
    input[type='range']::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; background: #292524; border: none; cursor: pointer;
    }
    input[type='color'] { -webkit-appearance: none; border: none; padding: 0; cursor: pointer; }
    input[type='color']::-webkit-color-swatch-wrapper { padding: 0; }
    input[type='color']::-webkit-color-swatch { border: 1px solid #d6d3d1; border-radius: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const CANVAS_W = 1000;
    const CANVAS_H = 1400;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function getTextColor(hex) {
      try {
        const { r, g, b } = hexToRgb(hex);
        return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.52 ? '#1c1917' : '#faf9f7';
      } catch { return '#1c1917'; }
    }

    function measureLines(ctx, text, maxWidth) {
      if (!text.trim()) return [];
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const candidate = line ? line + ' ' + word : word;
        if (ctx.measureText(candidate).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = candidate;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawWrappedText(ctx, lines, x, centerY, lineHeight) {
      const totalH = lines.length * lineHeight;
      const startY = centerY - totalH / 2 + lineHeight / 2;
      lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
      return startY + totalH - lineHeight / 2;
    }

    function Section({ label, value, children }) {
      return (
        <div>
          <div className="flex items-baseline justify-between mb-2.5">
            <span className="text-xs text-stone-400 uppercase" style={{ letterSpacing: '0.14em' }}>{label}</span>
            {value && <span className="text-xs text-stone-400 tabular-nums">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function App() {
      const [image, setImage]           = useState(null);
      const [title, setTitle]           = useState('A Walk Through Color');
      const [splitRatio, setSplitRatio] = useState(0.44);
      const [fontSize, setFontSize]     = useState(82);
      const [bgColor, setBgColor]       = useState('#c9bba8');
      const [isDragging, setIsDragging] = useState(false);
      const [fontsReady, setFontsReady] = useState(false);

      const canvasRef  = useRef(null);
      const fileRef    = useRef(null);

      const today = new Date()
        .toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        .toUpperCase();

      useEffect(() => {
        document.fonts.ready.then(() => setFontsReady(true));
      }, []);

      const drawCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const topH = Math.round(CANVAS_H * splitRatio);
        const botH = CANVAS_H - topH;

        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

        // Top: solid color
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, CANVAS_W, topH);

        // Bottom: image or placeholder
        if (image) {
          const imgAspect = image.width / image.height;
          const targetAspect = CANVAS_W / botH;
          let sx, sy, sw, sh;
          if (imgAspect > targetAspect) {
            sh = image.height; sw = image.height * targetAspect;
            sx = (image.width - sw) / 2; sy = 0;
          } else {
            sw = image.width; sh = image.width / targetAspect;
            sx = 0; sy = (image.height - sh) / 2;
          }
          ctx.drawImage(image, sx, sy, sw, sh, 0, topH, CANVAS_W, botH);
        } else {
          ctx.fillStyle = '#b8afa6';
          ctx.fillRect(0, topH, CANVAS_W, botH);
          ctx.fillStyle = 'rgba(250,249,247,0.4)';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = '28px "EB Garamond", Georgia, serif';
          ctx.fillText('Upload a photo', CANVAS_W / 2, topH + botH / 2);
        }

        // Text overlay
        const textColor = getTextColor(bgColor);
        ctx.fillStyle = textColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        const textCenterY = topH * 0.46;
        const maxTextW    = CANVAS_W * 0.76;
        const lineH       = fontSize * 1.22;

        ctx.font = `300 ${fontSize}px "Cormorant Garamond", Georgia, serif`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '3px';

        const titleLines  = measureLines(ctx, title || ' ', maxTextW);
        const titleBottom = drawWrappedText(ctx, titleLines, CANVAS_W / 2, textCenterY, lineH);

        // Rule
        const ruleY = titleBottom + 28;
        ctx.strokeStyle = textColor; ctx.globalAlpha = 0.35; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(CANVAS_W / 2 - 56, ruleY);
        ctx.lineTo(CANVAS_W / 2 + 56, ruleY);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Date
        const dateSz = Math.round(Math.max(18, fontSize * 0.26));
        ctx.font = `300 ${dateSz}px "Cormorant", Georgia, serif`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '8px';
        ctx.globalAlpha = 0.75;
        ctx.fillText(today, CANVAS_W / 2, ruleY + 36);
        ctx.globalAlpha = 1;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
      }, [image, bgColor, title, splitRatio, fontSize, today]);

      useEffect(() => { drawCanvas(); }, [drawCanvas, fontsReady]);

      const loadFile = useCallback(async (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = async () => {
          setImage(img);
          try {
            const palette = await Vibrant.from(url).getPalette();
            const swatch = palette.Vibrant ?? palette.LightVibrant ?? palette.Muted ?? palette.DarkVibrant;
            if (swatch) setBgColor(swatch.hex);
          } catch (e) { console.warn('Vibrant:', e); }
        };
        img.src = url;
      }, []);

      const handleExport = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = (title || 'cover').trim().replace(/\s+/g, '-').toLowerCase() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, [title]);

      const PREVIEW_W = 380;
      const previewH  = Math.round((PREVIEW_W / CANVAS_W) * CANVAS_H);

      return (
        <div className="min-h-screen bg-stone-50" style={{ fontFamily: "'EB Garamond', Georgia, serif" }}>
          <header className="border-b border-stone-200 px-10 py-5">
            <div className="max-w-5xl mx-auto flex items-baseline gap-4">
              <span className="text-xl text-stone-800" style={{ letterSpacing: '0.15em' }}>COLORWALK</span>
              <span className="text-sm text-stone-400" style={{ fontStyle: 'italic' }}>cover generator</span>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-10 py-14 flex gap-14 items-start">
            {/* Preview */}
            <div className="flex-shrink-0 flex flex-col items-center gap-3">
              <div
                className={`relative overflow-hidden cursor-pointer ${isDragging ? 'shadow-lg ring-1 ring-stone-400' : 'shadow-sm'}`}
                style={{ width: PREVIEW_W, height: previewH, background: '#e7e3de' }}
                onClick={() => fileRef.current?.click()}
                onDrop={(e) => { e.preventDefault(); setIsDragging(false); loadFile(e.dataTransfer.files[0]); }}
                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                onDragLeave={() => setIsDragging(false)}
              >
                <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H} style={{ width: '100%', height: '100%', display: 'block' }} />
                {isDragging && (
                  <div className="absolute inset-0 flex items-center justify-center bg-stone-900/20">
                    <span className="text-white text-sm" style={{ letterSpacing: '0.1em' }}>DROP IMAGE</span>
                  </div>
                )}
              </div>
              <p className="text-xs text-stone-400 uppercase" style={{ letterSpacing: '0.12em' }}>
                {CANVAS_W} × {CANVAS_H} · Click or drag to upload
              </p>
            </div>

            {/* Controls */}
            <div className="flex-1 flex flex-col gap-9 pt-1">
              <Section label="Photo">
                <button
                  onClick={() => fileRef.current?.click()}
                  className="w-full py-2.5 border border-stone-300 text-stone-600 text-sm hover:border-stone-500 hover:text-stone-800 transition-colors"
                  style={{ letterSpacing: '0.08em' }}
                >
                  {image ? 'Replace photo' : 'Upload photo'}
                </button>
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={(e) => loadFile(e.target.files[0])} />
              </Section>

              <Section label="Title">
                <input
                  type="text" value={title} onChange={(e) => setTitle(e.target.value)}
                  className="w-full border-b border-stone-200 focus:border-stone-600 outline-none py-1.5 text-stone-800 text-lg bg-transparent transition-colors"
                  style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}
                  placeholder="Enter a title…"
                />
              </Section>

              <Section label="Date">
                <p className="text-stone-500 text-sm" style={{ letterSpacing: '0.1em', fontStyle: 'italic' }}>{today}</p>
                <p className="text-xs text-stone-400 mt-1">Auto-generated from today's date</p>
              </Section>

              <Section label="Split ratio" value={`${Math.round(splitRatio * 100)} / ${Math.round((1 - splitRatio) * 100)}`}>
                <input type="range" min="0.2" max="0.75" step="0.01" value={splitRatio}
                  onChange={(e) => setSplitRatio(parseFloat(e.target.value))} className="mt-2" />
              </Section>

              <Section label="Font size" value={`${fontSize}px`}>
                <input type="range" min="36" max="140" step="2" value={fontSize}
                  onChange={(e) => setFontSize(parseInt(e.target.value))} className="mt-2" />
              </Section>

              <Section label="Background color">
                <div className="flex items-center gap-3 mt-0.5">
                  <div className="relative w-10 h-7 border border-stone-300 overflow-hidden flex-shrink-0">
                    <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)}
                      className="absolute -inset-1 cursor-pointer opacity-0" style={{ width: 'calc(100% + 8px)', height: 'calc(100% + 8px)' }} />
                    <div className="absolute inset-0" style={{ background: bgColor, pointerEvents: 'none' }} />
                  </div>
                  <span className="text-sm text-stone-600 font-mono uppercase" style={{ letterSpacing: '0.12em' }}>{bgColor.toUpperCase()}</span>
                  <span className="text-xs text-stone-400" style={{ fontStyle: 'italic' }}>extracted via Vibrant.js</span>
                </div>
              </Section>

              <div className="pt-5 mt-2 border-t border-stone-200">
                <button onClick={handleExport}
                  className="w-full py-3.5 bg-stone-800 text-stone-50 text-sm hover:bg-stone-900 transition-colors"
                  style={{ letterSpacing: '0.18em', fontFamily: "'EB Garamond', Georgia, serif" }}
                >
                  EXPORT AS PNG
                </button>
                <p className="text-xs text-stone-400 text-center mt-2" style={{ fontStyle: 'italic' }}>
                  Exports at {CANVAS_W} × {CANVAS_H}px
                </p>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
