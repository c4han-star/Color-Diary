<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorwalk — Cover Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/node-vibrant@3.1.6/dist/vibrant.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Courier Prime', 'Courier New', monospace; -webkit-font-smoothing: antialiased; }
    input[type='range'] { -webkit-appearance: none; appearance: none; height: 2px; background: #d6d3d1; border-radius: 0; outline: none; cursor: pointer; width: 100%; }
    input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #292524; cursor: pointer; }
    input[type='range']::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #292524; border: none; cursor: pointer; }
    input[type='color'] { -webkit-appearance: none; border: none; padding: 0; cursor: pointer; }
    input[type='color']::-webkit-color-swatch-wrapper { padding: 0; }
    input[type='color']::-webkit-color-swatch { border: 1px solid #d6d3d1; border-radius: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const CANVAS_W = 1000, CANVAS_H = 1400;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return { r, g, b };
    }

    function shiftColor(hex, amount) {
      const { r, g, b } = hexToRgb(hex);
      return `rgb(${Math.min(255,Math.max(0,r+amount))},${Math.min(255,Math.max(0,g+amount))},${Math.min(255,Math.max(0,b+amount))})`;
    }

    function getTextColor(hex) {
      try {
        const { r, g, b } = hexToRgb(hex);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.52 ? '#1c1917' : '#faf9f7';
      } catch { return '#1c1917'; }
    }

    function measureLines(ctx, text, maxWidth) {
      if (!text.trim()) return [];
      const words = text.split(' '), lines = []; let line = '';
      for (const word of words) {
        const c = line ? line+' '+word : word;
        if (ctx.measureText(c).width > maxWidth && line) { lines.push(line); line = word; } else line = c;
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawLines(ctx, lines, x, cy, lh) {
      const startY = cy - lines.length*lh/2 + lh/2;
      lines.forEach((l,i) => ctx.fillText(l, x, startY+i*lh));
      return startY + lines.length*lh - lh/2;
    }

    function addGrainToRegion(ctx, x, y, w, h, intensity) {
      const imageData = ctx.getImageData(x, y, w, h);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const noise = (Math.random() - 0.5) * intensity;
        d[i]   = Math.min(255, Math.max(0, d[i]   + noise));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] + noise));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] + noise));
      }
      ctx.putImageData(imageData, x, y);
    }

    function Section({ label, value, children }) {
      return <div><div className="flex items-baseline justify-between mb-2.5">
        <span className="text-xs text-stone-400 uppercase" style={{letterSpacing:'0.14em'}}>{label}</span>
        {value && <span className="text-xs text-stone-400">{value}</span>}
      </div>{children}</div>;
    }

    function App() {
      const [image, setImage] = useState(null);
      const [title, setTitle] = useState('A WALK THROUGH COLOR');
      const [split, setSplit] = useState(0.44);
      const [fontSize, setFontSize] = useState(26);
      const [bgColor, setBgColor] = useState('#c9bba8');
      const [drag, setDrag] = useState(false);
      const [fontsReady, setFontsReady] = useState(false);
      const canvasRef = useRef(null), fileRef = useRef(null);
      const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}).toUpperCase();

      useEffect(() => { document.fonts.ready.then(() => setFontsReady(true)); }, []);

      const draw = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const topH = Math.round(CANVAS_H * split), botH = CANVAS_H - topH;
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

        // Gradient top section
        const grad = ctx.createLinearGradient(0, 0, 0, topH);
        grad.addColorStop(0, shiftColor(bgColor, 28));
        grad.addColorStop(0.55, bgColor);
        grad.addColorStop(1, shiftColor(bgColor, -18));
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CANVAS_W, topH);

        // Grain / noise texture
        addGrainToRegion(ctx, 0, 0, CANVAS_W, topH, 38);

        // Bottom: image or placeholder
        if (image) {
          const ia = image.width/image.height, ta = CANVAS_W/botH;
          let sx,sy,sw,sh;
          if (ia > ta) { sh=image.height; sw=sh*ta; sx=(image.width-sw)/2; sy=0; }
          else { sw=image.width; sh=sw/ta; sx=0; sy=(image.height-sh)/2; }
          ctx.drawImage(image, sx, sy, sw, sh, 0, topH, CANVAS_W, botH);
        } else {
          ctx.fillStyle='#b8afa6'; ctx.fillRect(0,topH,CANVAS_W,botH);
          ctx.fillStyle='rgba(250,249,247,0.3)'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.font='24px "Courier Prime","Courier New",monospace';
          ctx.fillText('UPLOAD A PHOTO', CANVAS_W/2, topH+botH/2);
        }

        // Text overlay
        const tc = getTextColor(bgColor);
        ctx.fillStyle = tc;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        const textCenterY = topH * 0.46;
        const lineH = fontSize * 1.5;

        ctx.font = `400 ${fontSize}px "Courier Prime","Courier New",monospace`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '6px';

        const lines = measureLines(ctx, title || ' ', CANVAS_W * 0.7);
        const bottom = drawLines(ctx, lines, CANVAS_W/2, textCenterY, lineH);

        // Rule
        const ry = bottom + 32;
        ctx.strokeStyle = tc; ctx.globalAlpha = 0.3; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(CANVAS_W/2-40, ry); ctx.lineTo(CANVAS_W/2+40, ry); ctx.stroke();
        ctx.globalAlpha = 1;

        // Date
        ctx.font = `400 ${Math.max(14, Math.round(fontSize * 0.7))}px "Courier Prime","Courier New",monospace`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '4px';
        ctx.globalAlpha = 0.55;
        ctx.fillText(today, CANVAS_W/2, ry + 28);
        ctx.globalAlpha = 1;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
      }, [image, bgColor, title, split, fontSize, today]);

      useEffect(() => { draw(); }, [draw, fontsReady]);

      const load = useCallback(async (file) => {
        if (!file||!file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = async () => {
          setImage(img);
          try {
            const p = await Vibrant.from(url).getPalette();
            const s = p.Vibrant??p.LightVibrant??p.Muted??p.DarkVibrant;
            if (s) setBgColor(s.hex);
          } catch(e) {}
        };
        img.src = url;
      }, []);

      const exportPng = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const a = document.createElement('a');
        a.download = (title||'cover').trim().replace(/\s+/g,'-').toLowerCase()+'.png';
        a.href = canvas.toDataURL('image/png'); a.click();
      }, [title]);

      const PW = 380, PH = Math.round(PW/CANVAS_W*CANVAS_H);

      return (
        <div className="min-h-screen bg-stone-50" style={{fontFamily:"'Courier Prime','Courier New',monospace"}}>
          <header className="border-b border-stone-200 px-10 py-5">
            <div className="max-w-5xl mx-auto flex items-baseline gap-4">
              <span className="text-sm text-stone-800 tracking-widest">COLORWALK</span>
              <span className="text-xs text-stone-400">/ cover generator</span>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-10 py-14 flex gap-14 items-start">
            <div className="flex-shrink-0 flex flex-col items-center gap-3">
              <div className={`relative overflow-hidden cursor-pointer ${drag?'shadow-lg ring-1 ring-stone-400':'shadow-sm'}`}
                style={{width:PW,height:PH,background:'#e7e3de'}}
                onClick={()=>fileRef.current?.click()}
                onDrop={e=>{e.preventDefault();setDrag(false);load(e.dataTransfer.files[0]);}}
                onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}>
                <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H} style={{width:'100%',height:'100%',display:'block'}}/>
                {drag && <div className="absolute inset-0 flex items-center justify-center bg-stone-900/20">
                  <span className="text-white text-xs tracking-widest">DROP IMAGE</span></div>}
              </div>
              <p className="text-xs text-stone-400" style={{letterSpacing:'0.1em'}}>
                {CANVAS_W} × {CANVAS_H} · CLICK OR DRAG TO UPLOAD
              </p>
            </div>

            <div className="flex-1 flex flex-col gap-9 pt-1">
              <Section label="Photo">
                <button onClick={()=>fileRef.current?.click()}
                  className="w-full py-2.5 border border-stone-300 text-stone-600 text-xs hover:border-stone-500 hover:text-stone-800 transition-colors tracking-widest">
                  {image?'REPLACE PHOTO':'UPLOAD PHOTO'}</button>
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>load(e.target.files[0])}/>
              </Section>

              <Section label="Title">
                <input type="text" value={title} onChange={e=>setTitle(e.target.value)}
                  className="w-full border-b border-stone-200 focus:border-stone-600 outline-none py-1.5 text-stone-800 text-sm bg-transparent transition-colors tracking-widest"
                  style={{fontFamily:"'Courier Prime','Courier New',monospace"}}
                  placeholder="ENTER TITLE..."/>
              </Section>

              <Section label="Date">
                <p className="text-stone-500 text-xs tracking-widest">{today}</p>
                <p className="text-xs text-stone-400 mt-1">auto-generated</p>
              </Section>

              <Section label="Split ratio" value={`${Math.round(split*100)} / ${Math.round((1-split)*100)}`}>
                <input type="range" min="0.2" max="0.75" step="0.01" value={split}
                  onChange={e=>setSplit(parseFloat(e.target.value))} className="mt-2"/>
              </Section>

              <Section label="Font size" value={`${fontSize}px`}>
                <input type="range" min="12" max="72" step="1" value={fontSize}
                  onChange={e=>setFontSize(parseInt(e.target.value))} className="mt-2"/>
              </Section>

              <Section label="Background color">
                <div className="flex items-center gap-3 mt-0.5">
                  <div className="relative w-10 h-7 border border-stone-300 overflow-hidden flex-shrink-0">
                    <input type="color" value={bgColor} onChange={e=>setBgColor(e.target.value)}
                      className="absolute -inset-1 cursor-pointer opacity-0" style={{width:'calc(100% + 8px)',height:'calc(100% + 8px)'}}/>
                    <div className="absolute inset-0" style={{background:bgColor,pointerEvents:'none'}}/>
                  </div>
                  <span className="text-xs text-stone-600 font-mono tracking-widest">{bgColor.toUpperCase()}</span>
                  <span className="text-xs text-stone-400">auto-extracted</span>
                </div>
              </Section>

              <div className="pt-5 mt-2 border-t border-stone-200">
                <button onClick={exportPng}
                  className="w-full py-3.5 bg-stone-800 text-stone-50 text-xs tracking-widest hover:bg-stone-900 transition-colors">
                  EXPORT AS PNG
                </button>
                <p className="text-xs text-stone-400 text-center mt-2">exports at {CANVAS_W} × {CANVAS_H}px</p>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
